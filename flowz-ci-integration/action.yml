name: "Flowz CI Integration"
description: "Regenerate Flowz FSG/eFSG/system-view artifacts on every PR and push them to your .flowz-artifacts repo."
author: "flowzhq"
branding:
  icon: "git-branch"
  color: "purple"

# Composite action: everything runs on the CALLER's runner in one `uses:` step.
# The private flowz-ci / flowz (scanner) / fsg-enricher binaries are pulled from
# GHCR with a flowzhq-issued read:packages token (ADR-002) — the token is the
# access boundary; this public recipe carries no credentials. Artifacts-repo
# writes use a separate customer-org PAT, never the workflow's GITHUB_TOKEN.
#
# The CALLER's job must check out the repo first with `fetch-depth: 0`
# (change detection needs the merge-base with the target branch).

inputs:
  registry-user:
    description: "GHCR username for the flowzhq packages. Required unless flowz-ci-bin is set."
    required: false
  registry-token:
    description: "flowzhq-issued GHCR token with read:packages on flowz-ci, flowz-cli, and fsg-enricher. Pass a secret. Required unless flowz-ci-bin is set."
    required: false
  artifacts-token:
    description: "Customer-org PAT with contents:write on the artifacts repo. Pass a secret. Required unless dry-run."
    required: false
  artifacts-repo:
    description: "Artifacts repo as owner/name (or full clone URL). Default: <owner>/.flowz-artifacts."
    required: false
    default: ""
  flowz-ci-version:
    description: "Tag of ghcr.io/flowzhq/flowz-ci. Pin a version in production; latest is a convenience mirror."
    required: false
    default: "latest"
  scanner-version:
    description: "Pinned tag of ghcr.io/flowzhq/flowz-cli (e.g. v0.4.0). Required for real runs; only dry-run works without it."
    required: false
    default: ""
  enricher-version:
    description: "Pinned tag of ghcr.io/flowzhq/fsg-enricher (e.g. v0.1.0; the -linux-amd64 platform tag is pulled). Required for real runs; only dry-run works without it."
    required: false
    default: ""
  scan-path:
    description: "Path to scan, relative to the workspace."
    required: false
    default: "."
  skip-change-check:
    description: "Run even when no source changed (true/false) — e.g. for workflow_dispatch reruns."
    required: false
    default: "false"
  dry-run:
    description: "Print the resolved context and planned pipeline without executing (true/false)."
    required: false
    default: "false"
  viewer-base-url:
    description: "flowz-viewer base URL used in the PR architecture comment's links. Override for self-hosted viewers."
    required: false
    default: "https://flowzhq.github.io/viewer"
  flowz-ci-bin:
    description: "Internal (CI self-test): path to a prebuilt flowz-ci binary; skips all GHCR pulls."
    required: false
    default: ""

outputs:
  skipped:
    description: "true when the PR contained no source changes and the pipeline was skipped."
    value: ${{ steps.run.outputs.skipped }}
  systems:
    description: "Comma-separated systems whose system-view was recomputed."
    value: ${{ steps.run.outputs.systems }}
  artifacts-branch:
    description: "The artifacts-repo branch that was written to."
    value: ${{ steps.run.outputs.artifacts-branch }}

runs:
  using: composite
  steps:
    - uses: oras-project/setup-oras@v1
      if: ${{ inputs.flowz-ci-bin == '' }}

    - name: Bootstrap flowz toolchain from GHCR
      if: ${{ inputs.flowz-ci-bin == '' }}
      shell: bash
      env:
        REGISTRY_USER: ${{ inputs.registry-user }}
        REGISTRY_TOKEN: ${{ inputs.registry-token }}
        FLOWZ_CI_VERSION: ${{ inputs.flowz-ci-version }}
        SCANNER_VERSION: ${{ inputs.scanner-version }}
        ENRICHER_VERSION: ${{ inputs.enricher-version }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: bash "${{ github.action_path }}/scripts/bootstrap.sh"

    - name: Run flowz-ci
      id: run
      shell: bash
      env:
        FLOWZ_CI_BIN: ${{ inputs.flowz-ci-bin }}
        FLOWZ_CI_ARTIFACTS_TOKEN: ${{ inputs.artifacts-token }}
        FLOWZ_CI_ARTIFACTS_REPO: ${{ inputs.artifacts-repo }}
        FLOWZ_CI_VIEWER_BASE_URL: ${{ inputs.viewer-base-url }}
        # github.token, not secrets.GITHUB_TOKEN — composite actions can't read
        # secrets.*, but the github context flows in. Used only for the PR
        # architecture comment (needs permissions: pull-requests: write).
        GITHUB_TOKEN: ${{ github.token }}
        SCAN_PATH: ${{ inputs.scan-path }}
        SKIP_CHANGE_CHECK: ${{ inputs.skip-change-check }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        set -euo pipefail
        bin="${FLOWZ_CI_BIN:-flowz-ci}"
        "$bin" version
        args=(run --repo-path "$SCAN_PATH")
        if [ "$DRY_RUN" = "true" ]; then args+=(--dry-run); fi
        if [ "$SKIP_CHANGE_CHECK" = "true" ]; then args+=(--skip-change-check); fi
        "$bin" "${args[@]}"
